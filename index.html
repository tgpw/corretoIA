<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CorretoIA v2</title>
<style>
body{font-family:Arial;background:#0b0d12;color:#fff;padding:20px}
.box{background:#111;padding:15px;border-radius:10px;margin-bottom:10px}
input,select{padding:8px;margin:5px 0;width:100%}
button{padding:10px;background:#4f7cff;color:#fff;border:none;border-radius:6px;cursor:pointer}
</style>
</head>
<body>

<h2>CorretoIA v2 (estrutura estável)</h2>

<div class="box">
<h3>1. Identificação obrigatória</h3>
<input id="aluno" placeholder="Nome do aluno (obrigatório)">
<select id="modulo">
<option value="">Selecione o módulo</option>
<option>I</option><option>II</option><option>III</option>
</select>
<select id="disciplina">
<option value="">Selecione a disciplina</option>
<option>Introdução a EaD</option>
<option>Matemática</option>
</select>
<select id="tipo">
<option value="">Tipo de atividade</option>
<option>CRIAR</option>
<option>ENTENDER</option>
<option>DELINEAR</option>
</select>
</div>

<div class="box">
<h3>2. Upload</h3>
<input type="file" id="arquivo">
</div>

<div class="box">
<h3>3. Gabarito</h3>
<select id="gabarito">
<option value="">Selecione gabarito</option>
<option>Gabarito 1</option>
<option>Gabarito 2</option>
</select>
</div>

<div class="box">
<button onclick="validar()">Validar antes de corrigir</button>
<button onclick="corrigir()">Corrigir</button>
</div>

<div class="box" id="log"></div>

<script>

function log(msg){document.getElementById('log').innerHTML += msg+'<br>'}

function validar(){
  log('--- Validação ---')

  const aluno = document.getElementById('aluno').value
  const mod = document.getElementById('modulo').value
  const disc = document.getElementById('disciplina').value
  const tipo = document.getElementById('tipo').value
  const gab = document.getElementById('gabarito').value

  if(!aluno){log('❌ Nome obrigatório'); return false}
  if(!mod){log('❌ Módulo obrigatório'); return false}
  if(!disc){log('❌ Disciplina obrigatória'); return false}
  if(!tipo){log('❌ Tipo obrigatório'); return false}
  if(!gab){log('❌ Gabarito obrigatório'); return false}

  log('✅ Tudo validado')
  return true
}

function classificarTexto(texto){
  texto = texto.toLowerCase()

  if(texto.includes('minha experiência') || texto.includes('primeiro contato')) return 'ENTENDER'
  if(texto.includes('sugest') || texto.includes('proposta')) return 'CRIAR'
  return 'DELINEAR'
}

async function corrigir(){
  document.getElementById('log').innerHTML = ''

  if(!validar()) return

  const file = document.getElementById('arquivo').files[0]
  if(!file){log('❌ Envie um arquivo'); return}

  const texto = await file.text()

  const tipoInferido = classificarTexto(texto)
  const tipoSelecionado = document.getElementById('tipo').value

  log('Tipo inferido: '+tipoInferido)

  if(tipoInferido !== tipoSelecionado){
    log('⚠ Divergência entre tipo e conteúdo')
  }

  // Simulação de rubrica fixa
  const nota = aplicarRubrica(texto)

  log('Nota final: '+nota)
}

function aplicarRubrica(texto){
  let score = 100

  if(texto.length < 1000) score -= 20
  if(!texto.includes('educação')) score -= 20
  if(!texto.includes('ava')) score -= 10

  return score
}

</script>

</body>
</html>
