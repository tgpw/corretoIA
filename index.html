<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CorretoIA v3.3</title>
</head>
<body>
<script>
// CORREÇÃO PRINCIPAL

let SB_URL = localStorage.getItem('cia_sb_url') || '';
let SB_KEY = localStorage.getItem('cia_sb_key') || '';

const H = {
  apikey: SB_KEY,
  Authorization: 'Bearer ' + SB_KEY
};

// ✅ FUNÇÃO CORRIGIDA
async function api(url, options = {}) {
  const mergedHeaders = {
    ...H,
    ...(options.headers || {})
  };

  const res = await fetch(url, {
    ...options,
    headers: mergedHeaders
  });

  if (!res.ok) {
    const txt = await res.text();
    throw new Error(txt || 'Erro de requisição');
  }

  const ct = res.headers.get('content-type') || '';
  if (ct.includes('application/json')) return await res.json();
  return await res.text();
}

// EXEMPLO SALVAR DISCIPLINA (CORRIGIDO)
async function addDisciplina(){
  const nome = "teste";
  const modulo = "I";

  try{
    await api(`${SB_URL}/rest/v1/disciplinas`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nome, modulo})
    });

    alert("Disciplina salva com sucesso");

  }catch(e){
    alert('Erro: ' + e.message);
  }
}
</script>

<button onclick="addDisciplina()">Testar salvar</button>

</body>
</html>
