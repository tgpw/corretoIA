<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CorretoIA v2.1</title>
<style>
body{font-family:Arial;background:#0b0d12;color:#fff;padding:20px}
.box{background:#111;padding:15px;border-radius:10px;margin-bottom:10px}
input,select{padding:8px;margin:5px 0;width:100%}
button{padding:10px;background:#4f7cff;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-right:5px}
.file-item{background:#222;padding:6px;margin:4px 0;border-radius:6px}
.warn{color:#f59e0b}
.ok{color:#22c55e}
.err{color:#ef4444}
</style>
</head>
<body>

<h2>CorretoIA v2.1 (lote + fluxo real)</h2>

<div class="box">
<h3>1. Contexto do lote</h3>
<select id="modulo" onchange="loadDisciplinas()">
<option value="">Selecione módulo</option>
<option value="I">Módulo I</option>
<option value="II">Módulo II</option>
<option value="III">Módulo III</option>
</select>

<select id="disciplina" onchange="autoGabarito()">
<option value="">Selecione disciplina</option>
</select>

<select id="tipo">
<option value="">Tipo de atividade</option>
<option>CRIAR</option>
<option>ENTENDER</option>
<option>DELINEAR</option>
</select>

<select id="gabarito">
<option value="">Gabarito automático</option>
</select>
</div>

<div class="box">
<h3>2. Upload em lote</h3>
<input type="file" id="files" multiple onchange="handleFiles(event)">
<div id="lista"></div>
</div>

<div class="box">
<button onclick="analisar()">🔍 Analisar lote</button>
<button onclick="corrigir()">✦ Corrigir lote</button>
</div>

<div class="box" id="log"></div>

<script>

const disciplinasPorModulo = {
  I:["Introdução a EaD","Direito"],
  II:["Administração"],
  III:["Matemática"]
}

let arquivos = []

function log(msg,cls=''){
  document.getElementById('log').innerHTML += `<div class="${cls}">${msg}</div>`
}

function loadDisciplinas(){
  const mod = document.getElementById('modulo').value
  const select = document.getElementById('disciplina')
  select.innerHTML = '<option value="">Selecione disciplina</option>'

  if(!disciplinasPorModulo[mod]) return

  disciplinasPorModulo[mod].forEach(d=>{
    select.innerHTML += `<option>${d}</option>`
  })
}

function autoGabarito(){
  const disc = document.getElementById('disciplina').value
  const g = document.getElementById('gabarito')

  g.innerHTML = `<option>${disc} - padrão</option>`
}

function handleFiles(e){
  arquivos = Array.from(e.target.files)
  renderLista()
}

function renderLista(){
  const div = document.getElementById('lista')
  div.innerHTML = ''

  arquivos.forEach((f,i)=>{
    div.innerHTML += `
      <div class="file-item">
        ${f.name}
        <input placeholder="Nome do aluno" id="nome_${i}">
      </div>
    `
  })
}

function classificarTexto(t){
  t = t.toLowerCase()
  if(t.includes('minha experiência')) return 'ENTENDER'
  if(t.includes('sugest')||t.includes('proposta')) return 'CRIAR'
  return 'DELINEAR'
}

async function analisar(){
  document.getElementById('log').innerHTML=''

  if(!arquivos.length){log('Nenhum arquivo','err');return}

  for(let i=0;i<arquivos.length;i++){
    const f = arquivos[i]
    const txt = await f.text()
    const tipo = classificarTexto(txt)

    log(`${f.name} → ${tipo}`,'warn')
  }
}

function validarContexto(){
  if(!document.getElementById('modulo').value) return 'Módulo'
  if(!document.getElementById('disciplina').value) return 'Disciplina'
  if(!document.getElementById('tipo').value) return 'Tipo'
  return null
}

async function corrigir(){
  document.getElementById('log').innerHTML=''

  const erro = validarContexto()
  if(erro){log(`❌ ${erro} obrigatório`,'err');return}

  for(let i=0;i<arquivos.length;i++){
    const nome = document.getElementById(`nome_${i}`).value

    if(!nome){
      log(`⚠ ${arquivos[i].name} sem nome`,'warn')
      continue
    }

    log(`✔ Corrigido: ${nome}`,'ok')
  }
}

</script>

</body>
</html>
